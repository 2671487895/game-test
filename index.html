<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0c29;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .wrapper {
            text-align: center;
        }

        .header {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00e676, #69f0ae, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-board {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 100px;
        }
        .score-board .label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .score-board .value { color: #69f0ae; font-size: 1.6rem; }

        #gameCanvas {
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(0,0,0,0.35);
            box-shadow: 0 0 40px rgba(105, 240, 174, 0.1), 0 8px 32px rgba(0,0,0,0.4);
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #00e676, #00bcd4);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,230,118,0.35); }
        .btn:active { transform: scale(0.96); }

        .mobile-dpad {
            display: none;
            margin-top: 12px;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(3, 64px);
            gap: 6px;
        }
        .dpad-btn {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #ccc;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad-btn:active { background: rgba(0,230,118,0.2); }
        .dpad-up    { grid-area: up; }
        .dpad-down  { grid-area: down; }
        .dpad-left  { grid-area: left; }
        .dpad-right { grid-area: right; }

        .hint {
            margin-top: 8px;
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 600px), (pointer: coarse) {
            .mobile-dpad { display: grid; }
            #gameCanvas { max-width: 95vw; max-height: 55vh; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-board">
                <div class="label">得分</div>
                <div class="value" id="scoreValue">0</div>
            </div>
            <div class="score-board">
                <div class="label">最高</div>
                <div class="value" id="bestValue">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="mobile-dpad">
            <button class="dpad-btn dpad-up"    ontouchstart="setDir('up');event.preventDefault()"    onmousedown="setDir('up')">▲</button>
            <button class="dpad-btn dpad-left"  ontouchstart="setDir('left');event.preventDefault()"  onmousedown="setDir('left')">◀</button>
            <button class="dpad-btn dpad-right" ontouchstart="setDir('right');event.preventDefault()" onmousedown="setDir('right')">▶</button>
            <button class="dpad-btn dpad-down"  ontouchstart="setDir('down');event.preventDefault()"  onmousedown="setDir('down')">▼</button>
        </div>

        <div class="controls">
            <button class="btn" id="restartBtn">🔄 重新开始</button>
        </div>
        <div class="hint">方向键 / WASD 控制 ｜ 空格暂停</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // ── 配置 ──────────────────────────────
            const GRID = 20;           // 每格像素
            const COLS = 25;           // 列数
            const ROWS = 25;           // 行数
            const W = COLS * GRID;
            const H = ROWS * GRID;

            canvas.width = W;
            canvas.height = H;

            // ── 状态 ──────────────────────────────
            let snake, food, dir, nextDir, score, best, gameLoop, gameOver, paused, speed, particles;

            // 从 localStorage 读最高分
            best = parseInt(localStorage.getItem('snake_best') || '0', 10);
            document.getElementById('bestValue').textContent = best;

            // ── 初始化 ────────────────────────────
            function init() {
                snake = [
                    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
                    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
                    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
                ];
                dir = { x: 1, y: 0 };
                nextDir = { x: 1, y: 0 };
                score = 0;
                gameOver = false;
                paused = false;
                speed = 120;  // ms per tick
                particles = [];
                updateScore();
                spawnFood();
            }

            // ── 食物生成（避开蛇身）───────────────
            function spawnFood() {
                const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
                const free = [];
                for (let x = 0; x < COLS; x++) {
                    for (let y = 0; y < ROWS; y++) {
                        if (!occupied.has(`${x},${y}`)) free.push({ x, y });
                    }
                }
                if (free.length === 0) return; // 胜利（蛇占满全屏）
                food = free[Math.floor(Math.random() * free.length)];
                food.pulse = 0;
            }

            // ── 更新分数 ──────────────────────────
            function updateScore() {
                document.getElementById('scoreValue').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('snake_best', best);
                    document.getElementById('bestValue').textContent = best;
                }
            }

            // ── 粒子效果 ──────────────────────────
            function spawnParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: x * GRID + GRID / 2,
                        y: y * GRID + GRID / 2,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        size: 2 + Math.random() * 3,
                        hue: 120 + Math.random() * 40
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ── 游戏逻辑 ──────────────────────────
            function tick() {
                if (gameOver || paused) return;

                // 应用方向（禁止反向）
                if (!(nextDir.x === -dir.x && nextDir.y === -dir.y)) {
                    dir = { ...nextDir };
                }

                const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

                // 碰墙检测
                if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                    endGame();
                    return;
                }

                // 碰自己检测
                if (snake.some(s => s.x === head.x && s.y === head.y)) {
                    endGame();
                    return;
                }

                snake.unshift(head);

                // 吃食物
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    updateScore();
                    spawnParticles(food.x, food.y);
                    spawnFood();
                    // 加速
                    speed = Math.max(50, 120 - Math.floor(score / 50) * 5);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                } else {
                    snake.pop();
                }
            }

            function endGame() {
                gameOver = true;
                clearInterval(gameLoop);
                gameLoop = null;
            }

            // ── 渲染 ──────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // 网格线
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x <= COLS; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * GRID, 0);
                    ctx.lineTo(x * GRID, H);
                    ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * GRID);
                    ctx.lineTo(W, y * GRID);
                    ctx.stroke();
                }

                // 食物（脉冲动画）
                food.pulse = (food.pulse + 0.08) % (Math.PI * 2);
                const foodR = GRID / 2 - 1 + Math.sin(food.pulse) * 2;
                ctx.fillStyle = '#ff5252';
                ctx.shadowColor = '#ff5252';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, foodR, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 蛇身
                for (let i = snake.length - 1; i >= 0; i--) {
                    const s = snake[i];
                    const t = i / Math.max(snake.length - 1, 1); // 0=head, 1=tail
                    const g = Math.floor(180 - t * 130);
                    const pad = 1;

                    ctx.fillStyle = `rgb(0, ${g}, ${Math.floor(100 - t * 60)})`;
                    if (i === 0) {
                        // 蛇头：圆角矩形
                        const rx = s.x * GRID + pad;
                        const ry = s.y * GRID + pad;
                        const rw = GRID - pad * 2;
                        const rh = GRID - pad * 2;
                        const r = 5;
                        ctx.beginPath();
                        ctx.moveTo(rx + r, ry);
                        ctx.lineTo(rx + rw - r, ry);
                        ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
                        ctx.lineTo(rx + rw, ry + rh - r);
                        ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
                        ctx.lineTo(rx + r, ry + rh);
                        ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
                        ctx.lineTo(rx, ry + r);
                        ctx.quadraticCurveTo(rx, ry, rx + r, ry);
                        ctx.closePath();
                        ctx.fill();

                        // 眼睛
                        ctx.fillStyle = '#fff';
                        const ex = s.x * GRID + GRID / 2;
                        const ey = s.y * GRID + GRID / 2;
                        const eOffX = dir.x * 3;
                        const eOffY = dir.y * 3;
                        ctx.beginPath();
                        ctx.arc(ex + eOffX - 3, ey + eOffY - 3, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex + eOffX + 3, ey + eOffY - 3, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(ex + eOffX - 3, ey + eOffY - 3, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex + eOffX + 3, ey + eOffY - 3, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(s.x * GRID + pad, s.y * GRID + pad, GRID - pad * 2, GRID - pad * 2);
                    }
                }

                // 粒子
                drawParticles();

                // 游戏结束遮罩
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.65)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 32px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('游戏结束', W / 2, H / 2 - 12);
                    ctx.font = '16px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.fillStyle = '#aaa';
                    ctx.fillText('按 R 键或点击按钮重新开始', W / 2, H / 2 + 24);
                    ctx.textAlign = 'start';
                }

                // 暂停遮罩
                if (paused && !gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸ 已暂停', W / 2, H / 2);
                    ctx.textAlign = 'start';
                }
            }

            // ── 主循环 ────────────────────────────
            function frame() {
                updateParticles();
                draw();
                requestAnimationFrame(frame);
            }

            function start() {
                init();
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = setInterval(tick, speed);
            }

            // ── 方向控制 ──────────────────────────
            function setDir(d) {
                const map = {
                    up:    { x: 0, y: -1 },
                    down:  { x: 0, y: 1 },
                    left:  { x: -1, y: 0 },
                    right: { x: 1, y: 0 },
                };
                if (map[d]) nextDir = map[d];
            }

            // ── 键盘 ──────────────────────────────
            window.addEventListener('keydown', e => {
                const keyMap = {
                    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                    w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
                };
                if (keyMap[e.key]) {
                    e.preventDefault();
                    setDir(keyMap[e.key]);
                }
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (!gameOver) {
                        paused = !paused;
                        if (!paused) {
                            if (gameLoop) clearInterval(gameLoop);
                            gameLoop = setInterval(tick, speed);
                        } else {
                            clearInterval(gameLoop);
                            gameLoop = null;
                        }
                    }
                }
                if ((e.key === 'r' || e.key === 'R') && gameOver) {
                    e.preventDefault();
                    start();
                }
            });

            // ── 触屏滑动 ──────────────────────────
            let touchStart = null;
            canvas.addEventListener('touchstart', e => {
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, { passive: true });
            canvas.addEventListener('touchend', e => {
                if (!touchStart) return;
                const dx = e.changedTouches[0].clientX - touchStart.x;
                const dy = e.changedTouches[0].clientY - touchStart.y;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                if (Math.max(absDx, absDy) < 20) return; // 太小忽略
                if (absDx > absDy) {
                    setDir(dx > 0 ? 'right' : 'left');
                } else {
                    setDir(dy > 0 ? 'down' : 'up');
                }
                touchStart = null;
            });

            // ── 按钮 ──────────────────────────────
            document.getElementById('restartBtn').addEventListener('click', start);

            // ── 启动 ──────────────────────────────
            start();
            frame();
        })();
    </script>
</body>
</html>
